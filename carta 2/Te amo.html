<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flor Amarilla 🌼</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#0b0b1a, #1a1a2e);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 20px;
}

#contador {
    font-size: 22px;
    margin-top: 10px;
}

/* CONTENEDOR */
.flor-container {
    position: relative;
    width: 200px;
    height: 320px;
    margin: 60px auto;
}

/* FLOR */
.flor {
    position: absolute;
    top: 100px;
    left: 100px;
    transform: translate(-50%, -50%);
}

/* CENTRO */
.centro {
    position: absolute;
    width: 40px;
    height: 40px;
    background: orange;
    border-radius: 50%;
    top: -20px;
    left: -20px;
    z-index: 2;
}

/* PETALOS DE LA FLOR */
.petalo {
    position: absolute;
    width: 30px;
    height: 60px;
    background: yellow;
    border-radius: 50%;
    top: -60px;
    left: -15px;
    transform-origin: 50% 60px;
    box-shadow: 0 0 15px gold;
}

/* ROTACIONES */
.p1 { transform: rotate(0deg); }
.p2 { transform: rotate(45deg); }
.p3 { transform: rotate(90deg); }
.p4 { transform: rotate(135deg); }
.p5 { transform: rotate(180deg); }
.p6 { transform: rotate(225deg); }
.p7 { transform: rotate(270deg); }
.p8 { transform: rotate(315deg); }

/* TALLO */
.tallo {
    position: absolute;
    width: 6px;
    height: 150px;
    background: green;
    top: 120px;
    left: 97px;
}

/* HOJAS */
.hoja1, .hoja2 {
    position: absolute;
    width: 40px;
    height: 20px;
    background: green;
    border-radius: 20px;
}

.hoja1 {
    top: 160px;
    left: 60px;
    transform: rotate(-30deg);
}

.hoja2 {
    top: 200px;
    left: 100px;
    transform: rotate(30deg);
}

/* PETALOS CAYENDO */
.petalo-cayendo {
    position: fixed;
    top: -50px;
    width: 20px;
    height: 40px;
    background: yellow;
    border-radius: 50%;
    opacity: 0.8;
    animation: caer linear forwards;
}

@keyframes caer {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌼 presente para ti mi bella flor  🌼</h1>
<div id="contador"></div>

<div class="flor-container">

    <div class="flor">
        <div class="petalo p1"></div>
        <div class="petalo p2"></div>
        <div class="petalo p3"></div>
        <div class="petalo p4"></div>
        <div class="petalo p5"></div>
        <div class="petalo p6"></div>
        <div class="petalo p7"></div>
        <div class="petalo p8"></div>
        <div class="centro"></div>
    </div>

    <div class="tallo"></div>
    <div class="hoja1"></div>
    <div class="hoja2"></div>

</div>

<script>
// CONTADOR
function actualizarContador() {
    const inicio = new Date("2019-11-01T00:00:00");
    const ahora = new Date();

    let diferencia = ahora - inicio;

    let segundos = Math.floor(diferencia / 1000);
    let dias = Math.floor(segundos / 86400);
    segundos %= 86400;

    let horas = Math.floor(segundos / 3600);
    segundos %= 3600;

    let minutos = Math.floor(segundos / 60);
    segundos %= 60;

    document.getElementById("contador").innerText =
        `Te amo desde: ${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos 💛`;
}

actualizarContador();
setInterval(actualizarContador, 1000);

// PETALOS CAYENDO
function crearPetalo() {
    const petalo = document.createElement("div");
    petalo.classList.add("petalo-cayendo");

    petalo.style.left = Math.random() * window.innerWidth + "px";
    petalo.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(petalo);

    setTimeout(() => {
        petalo.remove();
    }, 6000);
}

// crear continuamente
setInterval(crearPetalo, 300);
</script>
<audio id="musica" autoplay loop>
    <source src="https://raw.githubusercontent.com/ORION37472/carta-2/main/carta%202/Mi%20Credo%20(LETRA).mp3" type="audio/mpeg">
</audio>
</body>
</html>
